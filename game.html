<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="game.css" rel="stylesheet">
</head>
<body>

    <h2>Select a goal to log progress</h2>

    <div class="shelf-layer">
        <div class="goals">
            <!-- Add the shelf side class directly to the button -->
            
            <button id="Goal1" class="goal left-shelf" onclick="openGoal(0)">
                <img src="images/starterPot.png" alt="pot" />
                <span>Goal 1</span>
            </button>

            <button id="Goal2" class="goal left-shelf" onclick="openGoal(1)">
                <img src="images/starterPot.png" alt="pot" />
                <span>Goal 2</span>
            </button>

            <button id="Goal3" class="goal left-shelf" onclick="openGoal(2)">
                <img src="images/starterPot.png" alt="pot" />
                <span>Goal 3</span>
            </button>
            <button id="Goal4" class="goal right-shelf" onclick="openGoal(3)">
                <img src="images/starterPot.png" alt="pot" />
                <span>Goal 4</span>
            </button>

            <button id="Goal5" class="goal left-shelf" onclick="openGoal(4)">
                <img src="images/starterPot.png" alt="pot" />
                <span>Goal 5</span>
            </button>
            <button id="Goal6" class="goal right-shelf" onclick="openGoal(5)">
                <img src="images/starterPot.png" alt="pot" />
                <span>Goal 6</span>
            </button>
        </div>
    </div>


    <!--button to trigger popup-->
    <button id="addPlantBtn" onclick="openModal()">Add Plant</button>
    
    <!--pop up to make a new plant-->
    <div id="newPlantModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999; justify-content:center; align-items:center; onclick:closeModal(); ">
        <div style="background:white; padding:30px; border-radius:8px; min-width:300px;">
            <h1>Create a New Plant</h1>
            <label for="GoalSelection">Choose a goal:</label>
            <select id="GoalSelection"></select>
            <button id="createPlant" onclick="closeModal()">Create Plant</button>
        </div>
    </div>

    <div class="buttons">
        <a href="entry.html"> <button type="button">Return</button></a>
    </div>
    
    <script src="script.js" defer></script>
    <script type="module" src="plantCreation.js"></script>

</body>
</html>
