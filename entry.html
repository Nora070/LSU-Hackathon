<!DOCTYPE html>
<html lang="en">
<head>
    <title>Self Growth</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="entry.css" rel="stylesheet">
</head>

<body>
    <h1>Welcome to Self Growth!</h1>

    <div class="actions">
        
            <input type="file" id="fileInput" accept=".csv" style="display:none" />

            <button type="button" onclick="startNewPlayer()">Start new player</button>
            <!--Create a new csv file for the player - automatically iterate the title based on number of files - ie player03 -->
            <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
                Load Existing Player Profile
            </button>
            <p id="newPlayerMsg" style="display:none; text-align:center; color:green; margin-top:10px;">
                File created! Load it in using "Load Existing Player Profile".
            </p>
            <button type="button" onclick="window.location.href='Instructions.html'">Instructions</button>

    </div>

    <div id="error" style="display:none; color:red;"></div>
    
    <div id="preview" style="display:none">
        <h2>Profile Loaded</h2>
        <p class="filename" id="filenameDisplay"></p>
        <ul class="goal-list" id="goalList"></ul>
        <button class="btn btn-primary" onclick="enterGarden()">
        Enter Your Garden →
        </button>
    </div>



<script src="script.js" defer></script>

<footer>
    <p>Produced by: Loyola WiCys + Aminat
        LSU Hackathon, March 2026
    </p>
</footer>

</body>



</html>
